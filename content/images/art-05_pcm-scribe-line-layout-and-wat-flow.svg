<?xml version="1.0" encoding="UTF-8"?>
<svg aria-label="PCM scribe-line layout and WAT flow" role="img" viewBox="0 0 740 360" xmlns="http://www.w3.org/2000/svg">
<style>
        .wafer{fill:none;stroke:#1A3C2E;stroke-width:2}
        .die{fill:#fff;stroke:#94A3B8;stroke-width:0.6}
        .scribe{fill:#fff5f5;stroke:#fecdd3;stroke-width:0.4}
        .pcm-cell{fill:#1A3C2E}
        .lbl{font:600 11px "Segoe UI",sans-serif;fill:#1A3C2E}
        .sub{font:10px "Segoe UI",sans-serif;fill:#475569}
        .ref{font:600 9.5px "Segoe UI",sans-serif;fill:#e63946}
        .arr{stroke:#475569;stroke-width:1.5;fill:none;marker-end:url(#ah_p)}
      </style>
<defs>
<marker id="ah_p" markerheight="5" markerwidth="5" orient="auto" refx="8" refy="5" viewBox="0 0 10 10"><path d="M0,0 L10,5 L0,10 z" fill="#475569"></path></marker>
</defs>
<!-- Wafer -->
<text class="lbl" x="20" y="22">A · Scribe-line PCM layout (300 mm wafer)</text>
<circle class="wafer" cx="120" cy="170" r="100"></circle>
<!-- Die array -->
<g transform="translate(70,120)">
<rect class="die" height="20" width="20" x="0" y="0"></rect>
<rect class="die" height="20" width="20" x="22" y="0"></rect>
<rect class="die" height="20" width="20" x="44" y="0"></rect>
<rect class="die" height="20" width="20" x="66" y="0"></rect>
<rect class="die" height="20" width="20" x="88" y="0"></rect>
<rect class="die" height="20" width="20" x="0" y="22"></rect>
<rect class="die" height="20" width="20" x="22" y="22"></rect>
<rect class="die" height="20" width="20" x="44" y="22"></rect>
<rect class="die" height="20" width="20" x="66" y="22"></rect>
<rect class="die" height="20" width="20" x="88" y="22"></rect>
<rect class="die" height="20" width="20" x="0" y="44"></rect>
<rect class="die" height="20" width="20" x="22" y="44"></rect>
<rect class="die" height="20" width="20" x="44" y="44"></rect>
<rect class="die" height="20" width="20" x="66" y="44"></rect>
<rect class="die" height="20" width="20" x="88" y="44"></rect>
<rect class="die" height="20" width="20" x="0" y="66"></rect>
<rect class="die" height="20" width="20" x="22" y="66"></rect>
<rect class="die" height="20" width="20" x="44" y="66"></rect>
<rect class="die" height="20" width="20" x="66" y="66"></rect>
<rect class="die" height="20" width="20" x="88" y="66"></rect>
<!-- Scribe lines (PCM here) -->
<rect class="scribe" height="2" width="108" x="0" y="20"></rect>
<rect class="scribe" height="2" width="108" x="0" y="42"></rect>
<rect class="scribe" height="2" width="108" x="0" y="64"></rect>
<rect class="scribe" height="86" width="2" x="20" y="0"></rect>
<rect class="scribe" height="86" width="2" x="42" y="0"></rect>
<rect class="scribe" height="86" width="2" x="64" y="0"></rect>
<rect class="scribe" height="86" width="2" x="86" y="0"></rect>
</g>
<!-- Callout to PCM structures -->
<path class="arr" d="M180,130 L240,90"></path>
<text class="sub" x="245" y="85">PCM cells in scribe lines</text>
<text class="sub" x="245" y="100">9-point typical sampling/wafer</text>
<!-- Right side: parameter list -->
<text class="lbl" x="380" y="22">B · WAT parameter classes (per JEP012A §12.1)</text>
<g>
<rect fill="#fff" height="50" stroke="#E2E8F0" width="340" x="380" y="35"></rect>
<text class="lbl" x="390" y="52">Transistor DC</text>
<text class="ref" x="390" y="64">§12.1.1</text>
<text class="sub" x="450" y="64">Vth, Idsat, Idoff, gm, BVDSS, gate leakage</text>
</g>
<g>
<rect fill="#fff" height="50" stroke="#E2E8F0" width="340" x="380" y="90"></rect>
<text class="lbl" x="390" y="107">Passive / interconnect</text>
<text class="ref" x="390" y="119">§12.2</text>
<text class="sub" x="450" y="119">Rsh sheet R, contact / via R, line capacitance</text>
</g>
<g>
<rect fill="#fff" height="50" stroke="#E2E8F0" width="340" x="380" y="145"></rect>
<text class="lbl" x="390" y="162">Capacitor</text>
<text class="ref" x="390" y="174">§12.3</text>
<text class="sub" x="450" y="174">MIM / MOS C, breakdown voltage</text>
</g>
<g>
<rect fill="#fff" height="50" stroke="#E2E8F0" width="340" x="380" y="200"></rect>
<text class="lbl" x="390" y="217">SRAM bit-cell</text>
<text class="ref" x="390" y="229">§12.4</text>
<text class="sub" x="450" y="229">Read/write margin, bit-cell Vmin</text>
</g>
<g>
<rect fill="#fff" height="50" stroke="#E2E8F0" width="340" x="380" y="255"></rect>
<text class="lbl" x="390" y="272">Mismatch / variability</text>
<text class="ref" x="390" y="284">§12.5</text>
<text class="sub" x="450" y="284">σVth(WL), Pelgrom A_VT coefficient</text>
</g>
<!-- Bottom: WAT flow -->
<text class="lbl" x="20" y="295">C · WAT flow per lot</text>
<g>
<rect fill="#1A3C2E" height="40" rx="5" width="100" x="20" y="305"></rect>
<text fill="#fff" font-family="Segoe UI" font-size="11" font-weight="700" text-anchor="middle" x="70" y="320">End-of-line</text>
<text fill="rgba(255,255,255,.6)" font-family="Segoe UI" font-size="9" text-anchor="middle" x="70" y="334">wafer ready</text>
</g>
<g>
<rect fill="#1A3C2E" height="40" rx="5" width="100" x="135" y="305"></rect>
<text fill="#fff" font-family="Segoe UI" font-size="11" font-weight="700" text-anchor="middle" x="185" y="320">Probe PCM</text>
<text fill="rgba(255,255,255,.6)" font-family="Segoe UI" font-size="9" text-anchor="middle" x="185" y="334">9 sites</text>
</g>
<g>
<rect fill="#1A3C2E" height="40" rx="5" width="100" x="250" y="305"></rect>
<text fill="#fff" font-family="Segoe UI" font-size="11" font-weight="700" text-anchor="middle" x="300" y="320">Extract</text>
<text fill="rgba(255,255,255,.6)" font-family="Segoe UI" font-size="9" text-anchor="middle" x="300" y="334">parameters</text>
</g>
<g>
<rect fill="#1A3C2E" height="40" rx="5" width="100" x="365" y="305"></rect>
<text fill="#fff" font-family="Segoe UI" font-size="11" font-weight="700" text-anchor="middle" x="415" y="320">SPC check</text>
<text fill="rgba(255,255,255,.6)" font-family="Segoe UI" font-size="9" text-anchor="middle" x="415" y="334">vs limits</text>
</g>
<g>
<rect fill="#1A3C2E" height="40" rx="5" width="100" x="480" y="305"></rect>
<text fill="#fff" font-family="Segoe UI" font-size="11" font-weight="700" text-anchor="middle" x="530" y="320">Grade</text>
<text fill="rgba(255,255,255,.6)" font-family="Segoe UI" font-size="9" text-anchor="middle" x="530" y="334">pass / hold</text>
</g>
<g>
<rect fill="#e63946" height="40" rx="5" width="125" x="595" y="305"></rect>
<text fill="#fff" font-family="Segoe UI" font-size="11" font-weight="700" text-anchor="middle" x="657" y="320">Ship to sort</text>
<text fill="rgba(255,255,255,.6)" font-family="Segoe UI" font-size="9" text-anchor="middle" x="657" y="334">or quarantine</text>
</g>
<path class="arr" d="M122,325 L132,325"></path>
<path class="arr" d="M237,325 L247,325"></path>
<path class="arr" d="M352,325 L362,325"></path>
<path class="arr" d="M467,325 L477,325"></path>
<path class="arr" d="M582,325 L592,325"></path>
</svg>
