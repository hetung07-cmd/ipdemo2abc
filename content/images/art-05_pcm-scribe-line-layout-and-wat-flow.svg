<svg xmlns="http://www.w3.org/2000/svg" aria-label="PCM scribe-line layout and WAT flow" role="img" viewBox="0 0 740 310">
<style type="text/css"><![CDATA[
  .lbl{font:700 11px "Segoe UI",sans-serif;fill:#1A3C2E}
  .sub{font:10px "Segoe UI",sans-serif;fill:#475569}
  .desc{font:9.5px "Segoe UI",sans-serif;fill:#475569}
  .ref{font:600 9.5px "Segoe UI",sans-serif;fill:#C2402E}
  .row-h{font:600 10.5px "Segoe UI",sans-serif;fill:#1A3C2E}
  .arr{stroke:#64748b;stroke-width:1.4;fill:none;marker-end:url(#ah)}
  .ft{font:700 10.5px "Segoe UI",sans-serif;fill:#fff;text-anchor:middle}
  .fs{font:9px "Segoe UI",sans-serif;fill:rgba(255,255,255,.62);text-anchor:middle}
]]></style>
<defs>
<marker id="ah" markerHeight="6" markerWidth="6" orient="auto" refX="9" refY="5" viewBox="0 0 10 10"><path d="M0,0 L10,5 L0,10 z" fill="#64748b"></path></marker>
</defs>

<!-- A: wafer -->
<text class="lbl" x="20" y="22">A · Scribe-line PCM layout (300 mm wafer)</text>
<circle cx="115" cy="150" fill="none" r="92" stroke="#1A3C2E" stroke-width="2"></circle>
<g transform="translate(66,101)">
<rect fill="#fff" height="20" stroke="#94A3B8" stroke-width="0.6" width="20" x="0" y="0"></rect>
<rect fill="#fff" height="20" stroke="#94A3B8" stroke-width="0.6" width="20" x="22" y="0"></rect>
<rect fill="#fff" height="20" stroke="#94A3B8" stroke-width="0.6" width="20" x="44" y="0"></rect>
<rect fill="#fff" height="20" stroke="#94A3B8" stroke-width="0.6" width="20" x="66" y="0"></rect>
<rect fill="#fff" height="20" stroke="#94A3B8" stroke-width="0.6" width="20" x="88" y="0"></rect>
<rect fill="#fff" height="20" stroke="#94A3B8" stroke-width="0.6" width="20" x="0" y="22"></rect>
<rect fill="#fff" height="20" stroke="#94A3B8" stroke-width="0.6" width="20" x="22" y="22"></rect>
<rect fill="#fff" height="20" stroke="#94A3B8" stroke-width="0.6" width="20" x="44" y="22"></rect>
<rect fill="#fff" height="20" stroke="#94A3B8" stroke-width="0.6" width="20" x="66" y="22"></rect>
<rect fill="#fff" height="20" stroke="#94A3B8" stroke-width="0.6" width="20" x="88" y="22"></rect>
<rect fill="#fff" height="20" stroke="#94A3B8" stroke-width="0.6" width="20" x="0" y="44"></rect>
<rect fill="#fff" height="20" stroke="#94A3B8" stroke-width="0.6" width="20" x="22" y="44"></rect>
<rect fill="#fff" height="20" stroke="#94A3B8" stroke-width="0.6" width="20" x="44" y="44"></rect>
<rect fill="#fff" height="20" stroke="#94A3B8" stroke-width="0.6" width="20" x="66" y="44"></rect>
<rect fill="#fff" height="20" stroke="#94A3B8" stroke-width="0.6" width="20" x="88" y="44"></rect>
<rect fill="#fff" height="20" stroke="#94A3B8" stroke-width="0.6" width="20" x="0" y="66"></rect>
<rect fill="#fff" height="20" stroke="#94A3B8" stroke-width="0.6" width="20" x="22" y="66"></rect>
<rect fill="#fff" height="20" stroke="#94A3B8" stroke-width="0.6" width="20" x="44" y="66"></rect>
<rect fill="#fff" height="20" stroke="#94A3B8" stroke-width="0.6" width="20" x="66" y="66"></rect>
<rect fill="#fff" height="20" stroke="#94A3B8" stroke-width="0.6" width="20" x="88" y="66"></rect>
<rect fill="#C2402E" height="2" width="108" x="0" y="20"></rect>
<rect fill="#C2402E" height="2" width="108" x="0" y="42"></rect>
<rect fill="#C2402E" height="2" width="108" x="0" y="64"></rect>
<rect fill="#C2402E" height="86" width="2" x="20" y="0"></rect>
<rect fill="#C2402E" height="86" width="2" x="42" y="0"></rect>
<rect fill="#C2402E" height="86" width="2" x="64" y="0"></rect>
<rect fill="#C2402E" height="86" width="2" x="86" y="0"></rect>
</g>
<path class="arr" d="M178,112 L232,82"></path>
<text class="sub" fill="#9F2D20" x="238" y="80">PCM cells sit in scribe lines (red)</text>
<text class="sub" x="238" y="96">9-point typical sampling / wafer</text>
<text class="sub" x="238" y="112">Consumed at dicing (zero die cost)</text>

<!-- B: parameter classes -->
<g transform="translate(9,-128)">
<text class="lbl" x="405" y="150">B · WAT parameter classes (JEP012A §12)</text>
<g>
<rect fill="#F8FAFC" height="30" rx="4" stroke="#E2E8F0" stroke-width="1" width="318" x="402" y="160"></rect>
<text class="row-h" x="414" y="173">Transistor DC</text><text class="ref" x="414" y="185">§12.1</text>
<text class="desc" x="528" y="180">Vth, Idsat, Idoff, gm, BVDSS, gate leak</text>
<rect fill="#F8FAFC" height="30" rx="4" stroke="#E2E8F0" stroke-width="1" width="318" x="402" y="194"></rect>
<text class="row-h" x="414" y="207">Passive / interconnect</text><text class="ref" x="414" y="219">§12.2</text>
<text class="desc" x="528" y="214">Rsh, contact / via R, line capacitance</text>
<rect fill="#F8FAFC" height="30" rx="4" stroke="#E2E8F0" stroke-width="1" width="318" x="402" y="228"></rect>
<text class="row-h" x="414" y="241">Capacitor</text><text class="ref" x="414" y="253">§12.3</text>
<text class="desc" x="528" y="248">MIM / MOS C, breakdown voltage</text>
<rect fill="#F8FAFC" height="30" rx="4" stroke="#E2E8F0" stroke-width="1" width="318" x="402" y="262"></rect>
<text class="row-h" x="414" y="275">SRAM bit-cell</text><text class="ref" x="414" y="287">§12.4</text>
<text class="desc" x="528" y="282">Read / write margin, bit-cell Vmin</text>
<rect fill="#F8FAFC" height="30" rx="4" stroke="#E2E8F0" stroke-width="1" width="318" x="402" y="296"></rect>
<text class="row-h" x="414" y="309">Mismatch / variability</text><text class="ref" x="414" y="321">§12.5</text>
<text class="desc" x="528" y="316">σVth(WL), Pelgrom A_VT coefficient</text>
</g>
</g>

<!-- C: WAT flow per lot — single horizontal row at the bottom -->
<text class="lbl" x="20" y="268">C · WAT flow per lot</text>
<g transform="translate(20,276)"><rect fill="#1A3C2E" height="34" rx="5" width="96"></rect>
<text class="ft" x="48" y="19">End-of-line</text><text class="fs" x="48" y="31">wafer ready</text></g>
<path class="arr" d="M116,293 L125,293"></path>
<g transform="translate(126,276)"><rect fill="#1A3C2E" height="34" rx="5" width="92"></rect>
<text class="ft" x="46" y="19">Probe PCM</text><text class="fs" x="46" y="31">9 sites</text></g>
<path class="arr" d="M218,293 L227,293"></path>
<g transform="translate(228,276)"><rect fill="#1A3C2E" height="34" rx="5" width="92"></rect>
<text class="ft" x="46" y="19">Extract</text><text class="fs" x="46" y="31">parameters</text></g>
<path class="arr" d="M320,293 L329,293"></path>
<g transform="translate(330,276)"><rect fill="#1A3C2E" height="34" rx="5" width="92"></rect>
<text class="ft" x="46" y="19">SPC check</text><text class="fs" x="46" y="31">vs limits</text></g>
<path class="arr" d="M422,293 L431,293"></path>
<g transform="translate(432,276)"><rect fill="#1A3C2E" height="34" rx="5" width="80"></rect>
<text class="ft" x="40" y="19">Grade</text><text class="fs" x="40" y="31">pass / hold</text></g>
<path class="arr" d="M512,293 L521,293"></path>
<g transform="translate(522,276)"><rect fill="#C2402E" height="34" rx="5" width="118"></rect>
<text class="ft" x="59" y="19">Ship to sort</text><text class="fs" x="59" y="31">or quarantine</text></g>
</svg>