<?xml version="1.0" encoding="UTF-8"?>
<svg aria-label="OEE components and SEMI E10 states" role="img" viewBox="0 0 740 340" xmlns="http://www.w3.org/2000/svg">
<style>
        .bar{stroke:#1A3C2E;stroke-width:0.6}
        .lbl{font:700 11px "Segoe UI",sans-serif;fill:#1A3C2E}
        .lbl-s{font:10px "Segoe UI",sans-serif;fill:#475569}
        .formula{font:800 14px "Cambria",serif;fill:#1A3C2E}
      </style>
<text class="lbl" x="20" y="22">SEMI E10 time stack (one calendar week of one tool)</text>
<!-- Stacked bar -->
<rect class="bar" fill="#1A3C2E" height="40" width="540" x="20" y="40"></rect>
<rect class="bar" fill="#1A3C2E" height="40" width="270" x="20" y="40"></rect>
<rect class="bar" fill="#475569" height="40" width="80" x="290" y="40"></rect>
<rect class="bar" fill="#94A3B8" height="40" width="55" x="370" y="40"></rect>
<rect class="bar" fill="#E2E8F0" height="40" width="50" x="425" y="40"></rect>
<rect class="bar" fill="#fff5f5" height="40" width="55" x="475" y="40"></rect>
<rect class="bar" fill="#F8FAFC" height="40" width="30" x="530" y="40"></rect>
<!-- Bar labels -->
<text fill="#fff" font-family="Segoe UI" font-size="11" font-weight="700" text-anchor="middle" x="155" y="65">Productive (50%)</text>
<text fill="#fff" font-family="Segoe UI" font-size="10" text-anchor="middle" x="330" y="65">Standby</text>
<text fill="#1A3C2E" font-family="Segoe UI" font-size="10" text-anchor="middle" x="397" y="65">Eng</text>
<text fill="#475569" font-family="Segoe UI" font-size="10" text-anchor="middle" x="450" y="65">SDT</text>
<text fill="#991B1B" font-family="Segoe UI" font-size="10" text-anchor="middle" x="502" y="65">UDT</text>
<text fill="#475569" font-family="Segoe UI" font-size="9" text-anchor="middle" x="545" y="65">NST</text>
<text class="lbl-s" x="570" y="65">168 h</text>
<!-- Operations / Equipment time markers -->
<line stroke="#1A3C2E" stroke-width="1.5" x1="20" x2="425" y1="85" y2="85"></line>
<line stroke="#1A3C2E" stroke-width="1.5" x1="20" x2="20" y1="92" y2="78"></line>
<line stroke="#1A3C2E" stroke-width="1.5" x1="425" x2="425" y1="92" y2="78"></line>
<text fill="#1A3C2E" font-family="Segoe UI" font-size="10" font-weight="700" text-anchor="middle" x="222" y="103">Operations Time (uptime)</text>
<line stroke="#475569" stroke-width="1.5" x1="20" x2="530" y1="115" y2="115"></line>
<line stroke="#475569" stroke-width="1.5" x1="20" x2="20" y1="122" y2="108"></line>
<line stroke="#475569" stroke-width="1.5" x1="530" x2="530" y1="122" y2="108"></line>
<text fill="#475569" font-family="Segoe UI" font-size="10" font-weight="700" text-anchor="middle" x="275" y="133">Manufacturing Time</text>
<!-- OEE formula -->
<text class="lbl" x="20" y="170">OEE formula</text>
<text class="formula" x="20" y="195">OEE = Availability × Performance × Quality</text>
<text class="lbl-s" x="20" y="218">Availability = Operations Time / Manufacturing Time</text>
<text class="lbl-s" x="20" y="234">Performance = Theoretical Throughput / Actual Throughput during PRD</text>
<text class="lbl-s" x="20" y="250">Quality = Good wafers / Total wafers produced</text>
<!-- MTTR/MTBF -->
<text class="lbl" x="20" y="282">MTTR / MTBF (reliability sub-metrics)</text>
<text class="lbl-s" x="20" y="302">MTBF = Operations Time / number of UDT events  (longer is better, target hours-to-days)</text>
<text class="lbl-s" x="20" y="318">MTTR = total UDT hours / number of UDT events  (shorter is better, target minutes-to-hours)</text>
<!-- Industry target box -->
<rect fill="#F8FAFC" height="170" rx="6" stroke="#1A3C2E" stroke-width="1.5" width="135" x="585" y="155"></rect>
<text fill="#1A3C2E" font-family="Segoe UI" font-size="11" font-weight="700" text-anchor="middle" x="652" y="178">Industry targets</text>
<text fill="#475569" font-family="Segoe UI" font-size="10" x="600" y="200">OEE: 70–85%</text>
<text fill="#475569" font-family="Segoe UI" font-size="10" x="600" y="218">Avail: 85–92%</text>
<text fill="#475569" font-family="Segoe UI" font-size="10" x="600" y="236">Perf:  85–95%</text>
<text fill="#475569" font-family="Segoe UI" font-size="10" x="600" y="254">Qual:  98–99.5%</text>
<text fill="#475569" font-family="Segoe UI" font-size="9.5" font-style="italic" x="600" y="280">litho scanner:</text>
<text fill="#475569" font-family="Segoe UI" font-size="10" x="600" y="294">MTBF &gt; 100 h</text>
<text fill="#475569" font-family="Segoe UI" font-size="10" x="600" y="310">MTTR &lt; 2 h</text>
</svg>
