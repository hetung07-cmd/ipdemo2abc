<?xml version="1.0" encoding="UTF-8"?>
<svg aria-label="Device Characterization process flow" role="img" viewBox="0 0 780 380" xmlns="http://www.w3.org/2000/svg">
<style>
        .blk{fill:#fff;stroke:#1A3C2E;stroke-width:1.5;rx:6}
        .blk-h{font:700 11px "Segoe UI",sans-serif;fill:#1A3C2E}
        .blk-t{font:11px "Segoe UI",sans-serif;fill:#475569}
        .blk-ref{font:600 9.5px "Segoe UI",sans-serif;fill:#e63946}
        .src{fill:#FEF2F2;stroke:#fecaca}
        .ana{fill:#EFF6FF;stroke:#BFDBFE}
        .rel{fill:#FFFBEB;stroke:#FDE68A}
        .out{fill:#1A3C2E}
        .out-t{font:700 11px "Segoe UI",sans-serif;fill:#fff}
        .arr2{stroke:#94A3B8;stroke-width:1.5;fill:none;marker-end:url(#ah2)}
      </style>
<defs>
<marker id="ah2" markerHeight="5" markerWidth="5" orient="auto" refX="8" refY="5" viewBox="0 0 10 10"><path d="M0,0 L10,5 L0,10 z" fill="#94A3B8"></path></marker>
</defs>
<!-- Stage 1: Test structure -->
<g>
<rect fill="#FEF2F2" height="100" rx="6" stroke="#fecaca" width="170" x="20" y="40"></rect>
<text class="blk-h" x="30" y="58">① Test structures</text>
<text class="blk-ref" x="30" y="73">JEP012A §12</text>
<text class="blk-t" x="30" y="92">• PCM in scribe line</text>
<text class="blk-t" x="30" y="107">• Long &amp; short NMOS/PMOS</text>
<text class="blk-t" x="30" y="121">• Diodes, varactors</text>
<text class="blk-t" x="30" y="135">• TEGs (passives)</text>
</g>
<!-- Arrow -->
<path class="arr2" d="M193,90 L220,90"></path>
<!-- Stage 2: DC test -->
<g>
<rect fill="#EFF6FF" height="100" rx="6" stroke="#BFDBFE" width="170" x="225" y="40"></rect>
<text class="blk-h" x="235" y="58">② DC parametric test</text>
<text class="blk-ref" x="235" y="73">JEP012A §12.1</text>
<text class="blk-t" x="235" y="92">• Vth (linear &amp; sat)</text>
<text class="blk-t" x="235" y="107">• Idsat, Idoff, gm</text>
<text class="blk-t" x="235" y="121">• BVDSS, junction leak</text>
<text class="blk-t" x="235" y="135">• Gate leakage</text>
</g>
<path class="arr2" d="M398,90 L425,90"></path>
<!-- Stage 3: SPICE -->
<g>
<rect fill="#EFF6FF" height="100" rx="6" stroke="#BFDBFE" width="170" x="430" y="40"></rect>
<text class="blk-h" x="440" y="58">③ Model extraction</text>
<text class="blk-ref" x="440" y="73">→ PDK SPICE</text>
<text class="blk-t" x="440" y="92">• BSIM4 parameters</text>
<text class="blk-t" x="440" y="107">• 6 corners (SS/TT/FF/SF/FS)</text>
<text class="blk-t" x="440" y="121">  at −40, 27, 125 °C</text>
<text class="blk-t" x="440" y="135">• Mismatch / variability</text>
</g>
<!-- Reliability branch -->
<g>
<rect fill="#FFFBEB" height="100" rx="6" stroke="#FDE68A" width="170" x="20" y="180"></rect>
<text class="blk-h" x="30" y="198">④ HCI</text>
<text class="blk-ref" x="30" y="213">JEP012A §8</text>
<text class="blk-t" x="30" y="232">• n-ch DC stress</text>
<text class="blk-t" x="30" y="247">• Vd Vg combination</text>
<text class="blk-t" x="30" y="261">• Lifetime model</text>
<text class="blk-t" x="30" y="275">• Acc. factor extract</text>
</g>
<g>
<rect fill="#FFFBEB" height="100" rx="6" stroke="#FDE68A" width="170" x="225" y="180"></rect>
<text class="blk-h" x="235" y="198">⑤ TDDB / GOI</text>
<text class="blk-ref" x="235" y="213">JEP012A §9</text>
<text class="blk-t" x="235" y="232">• V-ramp / QBD</text>
<text class="blk-t" x="235" y="247">• Time-dep. breakdown</text>
<text class="blk-t" x="235" y="261">• E-model exponent γ</text>
<text class="blk-t" x="235" y="275">• Ea ≈ 0.7 eV</text>
</g>
<g>
<rect fill="#FFFBEB" height="100" rx="6" stroke="#FDE68A" width="170" x="430" y="180"></rect>
<text class="blk-h" x="440" y="198">⑥ BTI</text>
<text class="blk-ref" x="440" y="213">JEP012A §10.4</text>
<text class="blk-t" x="440" y="232">• NBTI (p-ch)</text>
<text class="blk-t" x="440" y="247">• PBTI (n-ch HK)</text>
<text class="blk-t" x="440" y="261">• Ea ≈ 0.55 eV</text>
<text class="blk-t" x="440" y="275">• Recovery effects</text>
</g>
<!-- Branch arrows -->
<path class="arr2" d="M105,140 L105,178"></path>
<path class="arr2" d="M310,140 L310,178"></path>
<path class="arr2" d="M515,140 L515,178"></path>
<!-- Output -->
<g>
<rect class="out" height="200" rx="8" width="140" x="620" y="80"></rect>
<text class="out-t" text-anchor="middle" x="690" y="105">OUTPUTS</text>
<text fill="#fff" font-family="Segoe UI" font-size="11" font-weight="700" text-anchor="middle" x="690" y="135">PDK SPICE</text>
<text fill="rgba(255,255,255,.7)" font-family="Segoe UI" font-size="10.5" text-anchor="middle" x="690" y="151">corner models</text>
<text fill="#fff" font-family="Segoe UI" font-size="11" font-weight="700" text-anchor="middle" x="690" y="180">Cpk report</text>
<text fill="rgba(255,255,255,.7)" font-family="Segoe UI" font-size="10.5" text-anchor="middle" x="690" y="196">parametric yield</text>
<text fill="#fff" font-family="Segoe UI" font-size="11" font-weight="700" text-anchor="middle" x="690" y="225">Reliability</text>
<text fill="rgba(255,255,255,.7)" font-family="Segoe UI" font-size="10.5" text-anchor="middle" x="690" y="241">FIT projection</text>
<text fill="rgba(255,255,255,.7)" font-family="Segoe UI" font-size="10.5" text-anchor="middle" x="690" y="268">to JESD85</text>
</g>
<path class="arr2" d="M603,90 L618,140"></path>
<path class="arr2" d="M603,230 L618,200"></path>
<!-- Stage label -->
<text fill="#1A3C2E" font-family="Segoe UI" font-size="10" font-weight="700" x="20" y="25">PARAMETRIC (DC) CHARACTERIZATION</text>
<text fill="#92400E" font-family="Segoe UI" font-size="10" font-weight="700" x="20" y="170">RELIABILITY (WEAR-OUT) CHARACTERIZATION</text>
<!-- Footer caption -->
<text fill="#94A3B8" font-family="Segoe UI" font-size="9.5" font-style="italic" x="20" y="320">Activation energies and exponents from JEP122H Tables 6-1 and 6-2.</text>
</svg>