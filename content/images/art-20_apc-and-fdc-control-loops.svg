<?xml version="1.0" encoding="UTF-8"?>
<svg aria-label="APC and FDC control loops" role="img" viewBox="0 0 740 340" xmlns="http://www.w3.org/2000/svg">
<style>
        .tool{fill:#fff;stroke:#1A3C2E;stroke-width:1.5;rx:6}
        .tool-h{font:700 12px "Segoe UI",sans-serif;fill:#1A3C2E;text-anchor:middle}
        .ctrl{fill:#F8FAFC;stroke:#1A3C2E;stroke-width:1.5;rx:6}
        .ctrl-h{font:700 11px "Segoe UI",sans-serif;fill:#1A3C2E;text-anchor:middle}
        .ctrl-s{font:9.5px "Segoe UI",sans-serif;fill:#475569;text-anchor:middle}
        .arr{stroke:#1A3C2E;stroke-width:1.8;fill:none;marker-end:url(#ah_apc)}
        .arr-r{stroke:#e63946;stroke-width:1.5;fill:none;marker-end:url(#ah_r)}
        .lbl{font:700 11px "Segoe UI",sans-serif;fill:#1A3C2E}
      </style>
<defs>
<marker id="ah_apc" markerheight="5" markerwidth="5" orient="auto" refx="8" refy="5" viewBox="0 0 10 10"><path d="M0,0 L10,5 L0,10 z" fill="#1A3C2E"></path></marker>
<marker id="ah_r" markerheight="5" markerwidth="5" orient="auto" refx="8" refy="5" viewBox="0 0 10 10"><path d="M0,0 L10,5 L0,10 z" fill="#e63946"></path></marker>
</defs>
<text class="lbl" x="20" y="22">A · APC feedback loop (run-to-run control)</text>
<!-- Inputs -->
<rect fill="#1A3C2E" height="50" rx="6" width="100" x="40" y="50"></rect>
<text fill="#fff" font-family="Segoe UI" font-size="11" font-weight="700" text-anchor="middle" x="90" y="74">Recipe</text>
<text fill="rgba(255,255,255,.7)" font-family="Segoe UI" font-size="9.5" text-anchor="middle" x="90" y="90">inputs</text>
<path class="arr" d="M141,75 L180,75"></path>
<!-- Tool -->
<rect class="tool" height="50" width="160" x="181" y="50"></rect>
<text class="tool-h" x="261" y="74">Process tool</text>
<text fill="#475569" font-family="Segoe UI" font-size="9.5" text-anchor="middle" x="261" y="90">e.g. CVD chamber</text>
<path class="arr" d="M342,75 L380,75"></path>
<!-- Wafer -->
<rect fill="#fff" height="50" rx="6" stroke="#1A3C2E" width="100" x="381" y="50"></rect>
<text fill="#1A3C2E" font-family="Segoe UI" font-size="11" font-weight="700" text-anchor="middle" x="431" y="74">Wafer</text>
<text fill="#475569" font-family="Segoe UI" font-size="9.5" text-anchor="middle" x="431" y="90">processed</text>
<path class="arr" d="M482,75 L520,75"></path>
<!-- Inline metrology -->
<rect fill="#fff" height="50" rx="6" stroke="#1A3C2E" width="120" x="521" y="50"></rect>
<text fill="#1A3C2E" font-family="Segoe UI" font-size="11" font-weight="700" text-anchor="middle" x="581" y="74">Inline metrology</text>
<text fill="#475569" font-family="Segoe UI" font-size="9.5" text-anchor="middle" x="581" y="90">CD, thickness, etc.</text>
<path class="arr" d="M642,75 L680,75"></path>
<rect fill="#1A3C2E" height="50" rx="6" width="40" x="681" y="50"></rect>
<text fill="#fff" font-family="Segoe UI" font-size="10" font-weight="700" text-anchor="middle" x="701" y="80">data</text>
<!-- APC controller (feedback) -->
<rect class="ctrl" height="55" width="200" x="280" y="160"></rect>
<text class="ctrl-h" x="380" y="180">APC controller</text>
<text class="ctrl-s" x="380" y="196">EWMA / model-based</text>
<text class="ctrl-s" x="380" y="208">computes recipe offset</text>
<path class="arr-r" d="M700,105 Q700,135 380,140 L380,158"></path>
<path class="arr-r" d="M280,180 Q150,180 90,140 L90,103"></path>
<text fill="#e63946" font-family="Segoe UI" font-size="10" font-style="italic" x="190" y="195">recipe adjustment for next lot</text>
<!-- B: FDC -->
<text class="lbl" x="20" y="250">B · FDC equipment-sensor monitor (real-time)</text>
<rect class="tool" height="55" width="160" x="40" y="265"></rect>
<text class="tool-h" x="120" y="288">Tool sensors</text>
<text fill="#475569" font-family="Segoe UI" font-size="9.5" text-anchor="middle" x="120" y="305">P · T · gas · RF · He</text>
<path class="arr-r" d="M201,293 L240,293"></path>
<rect class="ctrl" height="55" width="200" x="241" y="265"></rect>
<text class="ctrl-h" x="341" y="285">FDC engine</text>
<text class="ctrl-s" x="341" y="300">multivariate model</text>
<text class="ctrl-s" x="341" y="312">PCA · T² statistic · SPE</text>
<path class="arr-r" d="M442,293 L480,293"></path>
<rect fill="#fff5f5" height="55" rx="6" stroke="#e63946" stroke-width="1.5" width="240" x="481" y="265"></rect>
<text fill="#e63946" font-family="Segoe UI" font-size="11" font-weight="700" text-anchor="middle" x="601" y="285">Tool down or alert</text>
<text fill="#991B1B" font-family="Segoe UI" font-size="9.5" text-anchor="middle" x="601" y="302">stops processing before bad wafer</text>
</svg>
