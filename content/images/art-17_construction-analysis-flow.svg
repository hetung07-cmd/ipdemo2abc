<?xml version="1.0" encoding="UTF-8"?>
<svg aria-label="Construction Analysis flow" role="img" viewBox="0 0 740 320" xmlns="http://www.w3.org/2000/svg">
<style type="text/css"><![CDATA[
  .st-h{font:700 12px "Segoe UI",sans-serif;fill:#1A3C2E}
  .st-r{font:600 9.5px "Segoe UI",sans-serif;fill:#C2402E}
  .st-d{font:10.5px "Segoe UI",sans-serif;fill:#475569}
  .arr{stroke:#1A3C2E;stroke-width:1.8;fill:none;marker-end:url(#ah)}
  .lbl{font:700 11px "Segoe UI",sans-serif;fill:#1A3C2E}
  .blk-h{font:700 11px "Segoe UI",sans-serif;fill:#1A3C2E}
]]></style>
<defs>
<marker id="ah" markerHeight="6" markerWidth="6" orient="auto" refX="9" refY="5" viewBox="0 0 10 10"><path d="M0,0 L10,5 L0,10 z" fill="#1A3C2E"></path></marker>
</defs>

<g transform="translate(20,38)"><rect fill="#fff" height="104" rx="6" stroke="#1A3C2E" stroke-width="1.4" width="160"></rect>
<text class="st-h" x="14" y="24">1. Sample selection</text>
<text class="st-r" x="14" y="40">§13.1</text>
<text class="st-d" x="14" y="60">Wafer from 3 qual lots</text>
<text class="st-d" x="14" y="78">Center, mid, edge dies</text>
<text class="st-d" x="14" y="96">3 dies per location</text></g>
<path class="arr" d="M180,90 L210,90"></path>
<g transform="translate(212,38)"><rect fill="#fff" height="104" rx="6" stroke="#1A3C2E" stroke-width="1.4" width="160"></rect>
<text class="st-h" x="14" y="24">2. Sample prep</text>
<text class="st-r" x="14" y="40">§13.2</text>
<text class="st-d" x="14" y="60">Decap / dice</text>
<text class="st-d" x="14" y="78">Cross-section polish</text>
<text class="st-d" x="14" y="96">FIB / mechanical thinning</text></g>
<path class="arr" d="M372,90 L402,90"></path>
<g transform="translate(404,38)"><rect fill="#fff" height="104" rx="6" stroke="#1A3C2E" stroke-width="1.4" width="160"></rect>
<text class="st-h" x="14" y="24">3. Imaging &amp; measure</text>
<text class="st-r" x="14" y="40">§13.3</text>
<text class="st-d" x="14" y="60">Topographical SEM</text>
<text class="st-d" x="14" y="78">Cross-section SEM / TEM</text>
<text class="st-d" x="14" y="96">EDX for composition</text></g>
<path class="arr" d="M564,90 L594,90"></path>
<g transform="translate(596,38)"><rect fill="#1A3C2E" height="104" rx="6" width="124"></rect>
<text font-family="Segoe UI" font-size="12" font-weight="700" fill="#ffffff" x="14" y="24">4. Report</text>
<text font="600 9.5px 'Segoe UI'" font-family="Segoe UI" font-size="9.5" font-weight="600" fill="rgba(255,255,255,.72)" x="14" y="40">deliverable</text>
<text fill="#e8eeeb" font-family="Segoe UI" font-size="10.5" x="14" y="60">Layer thickness</text>
<text fill="#e8eeeb" font-family="Segoe UI" font-size="10.5" x="14" y="78">CD measurements</text>
<text fill="#e8eeeb" font-family="Segoe UI" font-size="10.5" x="14" y="96">Image library</text></g>

<text class="lbl" x="20" y="180">Quantified parameters captured in the report (per JEP012A §13.3)</text>

<g transform="translate(20,194)"><rect fill="#F1F5F9" height="104" rx="6" stroke="#94A3B8" stroke-width="1" stroke-dasharray="3 2" width="220"></rect>
<text class="blk-h" x="14" y="22">FEOL</text>
<text class="st-d" x="14" y="42">Gate oxide / high-k thickness</text>
<text class="st-d" x="14" y="60">Poly / metal gate length</text>
<text class="st-d" x="14" y="78">Source / drain depth</text>
<text class="st-d" x="14" y="96">STI depth and profile</text></g>
<g transform="translate(252,194)"><rect fill="#F1F5F9" height="104" rx="6" stroke="#94A3B8" stroke-width="1" stroke-dasharray="3 2" width="220"></rect>
<text class="blk-h" x="14" y="22">MOL / Contact</text>
<text class="st-d" x="14" y="42">Contact height &amp; diameter</text>
<text class="st-d" x="14" y="60">Salicide thickness</text>
<text class="st-d" x="14" y="78">Barrier layer composition</text>
<text class="st-d" x="14" y="96">Liner integrity</text></g>
<g transform="translate(484,194)"><rect fill="#F1F5F9" height="104" rx="6" stroke="#94A3B8" stroke-width="1" stroke-dasharray="3 2" width="236"></rect>
<text class="blk-h" x="14" y="22">BEOL</text>
<text class="st-d" x="14" y="42">Metal CD per layer</text>
<text class="st-d" x="14" y="60">Via diameter and shape</text>
<text class="st-d" x="14" y="78">ILD thickness and k value</text>
<text class="st-d" x="14" y="96">Cu fill quality, no voids</text></g>
</svg>