<?xml version="1.0" encoding="UTF-8"?>
<svg aria-label="Lot types flowing through a fab and their priority interaction" role="img" viewBox="0 0 740 360" xmlns="http://www.w3.org/2000/svg">
<style>
        .ln{stroke:#1A3C2E;stroke-width:1.5;fill:none;marker-end:url(#ah_l)}
        .lot{rx:6;stroke-width:1.5}
        .lot-rd{fill:#fff5f5;stroke:#e63946}
        .lot-eng{fill:#fff;stroke:#1A3C2E}
        .lot-qual{fill:#fff;stroke:#1A3C2E}
        .lot-prod{fill:#1A3C2E;stroke:#1A3C2E}
        .lot-hot{fill:#e63946;stroke:#e63946}
        .lot-t{font:700 10.5px "Segoe UI",sans-serif}
        .lot-d{font:10px "Segoe UI",sans-serif}
        .stg{font:800 11px "Segoe UI",sans-serif;fill:#1A3C2E;text-anchor:middle}
        .lbl{font:600 11px "Segoe UI",sans-serif;fill:#475569}
        .bottl{font:700 11px "Segoe UI",sans-serif;fill:#e63946}
      </style>
<defs>
<marker id="ah_l" markerheight="5" markerwidth="5" orient="auto" refx="8" refy="5" viewBox="0 0 10 10"><path d="M0,0 L10,5 L0,10 z" fill="#1A3C2E"></path></marker>
</defs>
<!-- Stages along the fab -->
<text class="stg" x="120" y="22">Litho</text>
<text class="stg" x="280" y="22">Etch</text>
<text class="stg" x="440" y="22">Implant</text>
<text class="stg" x="600" y="22">Metal / CMP</text>
<line stroke="#475569" stroke-width="0.5" x1="60" x2="700" y1="30" y2="30"></line>
<!-- Bottleneck callout -->
<rect fill="#fff5f5" height="50" rx="6" stroke="#fecdd3" width="120" x="60" y="40"></rect>
<text class="bottl" text-anchor="middle" x="120" y="58">⚠ Bottleneck</text>
<text fill="#991B1B" font-family="Segoe UI" font-size="9.5" text-anchor="middle" x="120" y="73">~35–45 % of total</text>
<text fill="#991B1B" font-family="Segoe UI" font-size="9.5" text-anchor="middle" x="120" y="85">wafer waiting time [1]</text>
<!-- Lot flowing through -->
<text class="lbl" x="20" y="120">Hot lot</text>
<rect class="lot lot-hot" height="22" width="50" x="80" y="105"></rect>
<text class="lot-t" fill="#fff" text-anchor="middle" x="105" y="120">SUPER-HOT</text>
<path class="ln" d="M134,116 L240,116" stroke="#e63946"></path>
<rect class="lot lot-hot" height="22" width="50" x="240" y="105"></rect>
<text class="lot-t" fill="#fff" text-anchor="middle" x="265" y="120">SUPER-HOT</text>
<path class="ln" d="M294,116 L400,116" stroke="#e63946"></path>
<rect class="lot lot-hot" height="22" width="50" x="400" y="105"></rect>
<text class="lot-t" fill="#fff" text-anchor="middle" x="425" y="120">SUPER-HOT</text>
<path class="ln" d="M454,116 L560,116" stroke="#e63946"></path>
<rect class="lot lot-hot" height="22" width="50" x="560" y="105"></rect>
<text class="lot-t" fill="#fff" text-anchor="middle" x="585" y="120">SUPER-HOT</text>
<!-- R&D lot -->
<text class="lbl" x="20" y="160">R&amp;D lot</text>
<rect class="lot lot-rd" height="22" width="40" x="80" y="145"></rect>
<text class="lot-t" fill="#1A3C2E" text-anchor="middle" x="100" y="160">R&amp;D</text>
<path class="ln" d="M124,156 L240,156"></path>
<rect class="lot lot-rd" height="22" width="40" x="240" y="145"></rect>
<text class="lot-t" fill="#1A3C2E" text-anchor="middle" x="260" y="160">R&amp;D</text>
<path class="ln" d="M284,156 L400,156"></path>
<rect class="lot lot-rd" height="22" width="40" x="400" y="145"></rect>
<text class="lot-t" fill="#1A3C2E" text-anchor="middle" x="420" y="160">R&amp;D</text>
<path class="ln" d="M444,156 L560,156"></path>
<rect class="lot lot-rd" height="22" width="40" x="560" y="145"></rect>
<text class="lot-t" fill="#1A3C2E" text-anchor="middle" x="580" y="160">R&amp;D</text>
<!-- Engineering -->
<text class="lbl" x="20" y="200">Eng. lot</text>
<rect class="lot lot-eng" height="22" width="40" x="80" y="185"></rect>
<text class="lot-t" fill="#1A3C2E" text-anchor="middle" x="100" y="200">ENG</text>
<path class="ln" d="M124,196 L240,196"></path>
<rect class="lot lot-eng" height="22" width="40" x="240" y="185"></rect>
<text class="lot-t" fill="#1A3C2E" text-anchor="middle" x="260" y="200">ENG</text>
<path class="ln" d="M284,196 L400,196"></path>
<rect class="lot lot-eng" height="22" width="40" x="400" y="185"></rect>
<text class="lot-t" fill="#1A3C2E" text-anchor="middle" x="420" y="200">ENG</text>
<path class="ln" d="M444,196 L560,196"></path>
<rect class="lot lot-eng" height="22" width="40" x="560" y="185"></rect>
<text class="lot-t" fill="#1A3C2E" text-anchor="middle" x="580" y="200">ENG</text>
<!-- Qualification -->
<text class="lbl" x="20" y="240">Qual. lot</text>
<rect class="lot lot-qual" height="22" width="40" x="80" y="225"></rect>
<text class="lot-t" fill="#1A3C2E" text-anchor="middle" x="100" y="240">QUAL</text>
<path class="ln" d="M124,236 L240,236"></path>
<rect class="lot lot-qual" height="22" width="40" x="240" y="225"></rect>
<text class="lot-t" fill="#1A3C2E" text-anchor="middle" x="260" y="240">QUAL</text>
<path class="ln" d="M284,236 L400,236"></path>
<rect class="lot lot-qual" height="22" width="40" x="400" y="225"></rect>
<text class="lot-t" fill="#1A3C2E" text-anchor="middle" x="420" y="240">QUAL</text>
<path class="ln" d="M444,236 L560,236"></path>
<rect class="lot lot-qual" height="22" width="40" x="560" y="225"></rect>
<text class="lot-t" fill="#1A3C2E" text-anchor="middle" x="580" y="240">QUAL</text>
<!-- Production lots -->
<text class="lbl" x="20" y="285">Production</text>
<rect class="lot lot-prod" height="22" width="40" x="80" y="265"></rect>
<text class="lot-t" fill="#fff" text-anchor="middle" x="100" y="280">PROD</text>
<rect class="lot lot-prod" height="22" width="40" x="125" y="265"></rect>
<text class="lot-t" fill="#fff" text-anchor="middle" x="145" y="280">PROD</text>
<rect class="lot lot-prod" height="22" width="40" x="170" y="265"></rect>
<text class="lot-t" fill="#fff" text-anchor="middle" x="190" y="280">PROD</text>
<path class="ln" d="M214,276 L240,276"></path>
<rect class="lot lot-prod" height="22" width="40" x="240" y="265"></rect>
<text class="lot-t" fill="#fff" text-anchor="middle" x="260" y="280">PROD</text>
<rect class="lot lot-prod" height="22" width="40" x="285" y="265"></rect>
<text class="lot-t" fill="#fff" text-anchor="middle" x="305" y="280">PROD</text>
<path class="ln" d="M329,276 L400,276"></path>
<rect class="lot lot-prod" height="22" width="40" x="400" y="265"></rect>
<text class="lot-t" fill="#fff" text-anchor="middle" x="420" y="280">PROD</text>
<rect class="lot lot-prod" height="22" width="40" x="445" y="265"></rect>
<text class="lot-t" fill="#fff" text-anchor="middle" x="465" y="280">PROD</text>
<path class="ln" d="M489,276 L560,276"></path>
<rect class="lot lot-prod" height="22" width="40" x="560" y="265"></rect>
<text class="lot-t" fill="#fff" text-anchor="middle" x="580" y="280">PROD</text>
<!-- Notes -->
<text fill="#475569" font-family="Segoe UI" font-size="10" font-style="italic" x="20" y="320">High-priority lots (R&amp;D, Eng, Hot) cut in front of production lots at every dispatch decision</text>
<text fill="#475569" font-family="Segoe UI" font-size="10" font-style="italic" x="20" y="338">Result: production cycle time grows non-linearly with R&amp;D-lot fraction · the productivity trade-off quantified in [1]</text>
</svg>
