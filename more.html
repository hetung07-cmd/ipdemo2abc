<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Specific Processes in Fab</title>
<style>
  /* ===== COLOR TOKENS — sửa màu toàn site tại đây ===== */
  :root{
    --c-blue:     #1E3A5F;  /* Xanh sẫm chủ đạo: accent, header, active */
    --c-blue-dk:  #14293F;  /* Xanh đậm hơn: hover, nhấn mạnh */
    --c-black:    #1A1F26;  /* Text chính */
    --c-charcoal: #44494D;  /* Text phụ */
    --c-gray:     #B5B4B4;  /* Border, đường kẻ */
    --c-gray-lt:  #F2F2F2;  /* Nền nhạt, bề mặt phụ */
    --c-gray-bg:  #ECEEF1;  /* Nền trang (hơi xanh-xám) */
    --c-white:    #FFFFFF;  /* Nền card */
    --c-blue-tint:#E8EDF3;  /* Nền hover/active rất nhạt */
    --sidebar-w:  300px;
  }

  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--c-gray-bg);color:var(--c-black);font-size:14px;line-height:1.7}

  .wiki-layout{display:grid;grid-template-columns:var(--sidebar-w) 1fr;min-height:100vh}
  @media (max-width:880px){.wiki-layout{grid-template-columns:1fr}}

  /* ===== SIDEBAR ===== */
  .wiki-side{background:var(--c-white);border-right:1px solid var(--c-gray);height:100vh;position:sticky;top:0;overflow-y:auto}
  .wiki-brand{padding:18px 20px;background:var(--c-blue);color:var(--c-white)}
  .wiki-brand .logo{font-size:18px;font-weight:800;letter-spacing:.01em;line-height:1.2}
  .wiki-brand .sub{font-size:12px;color:var(--c-blue-tint);margin-top:3px}

  .wiki-nav{padding:8px 0 30px}
  .nav-home{display:block;padding:13px 20px;font-size:14px;font-weight:700;color:var(--c-blue);text-decoration:none;border-bottom:1px solid var(--c-gray-lt);border-left:3px solid transparent}
  .nav-home:hover{background:var(--c-blue-tint)}
  .nav-home.active{background:var(--c-blue-tint);border-left-color:var(--c-blue)}

  .nav-search{padding:12px 16px 8px}
  .nav-search input{width:100%;padding:8px 11px;font-size:13px;color:var(--c-black);
    background:var(--c-gray-lt);border:1px solid var(--c-gray);border-radius:6px;outline:none}
  .nav-search input::placeholder{color:var(--c-charcoal)}
  .nav-search input:focus{border-color:var(--c-blue);background:var(--c-white)}

  .nav-group-label{padding:14px 20px 6px;font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--c-blue);border-top:1px solid var(--c-gray-lt)}
  .wiki-nav a.topic{display:block;padding:9px 20px 9px 28px;font-size:13px;color:var(--c-black);text-decoration:none;border-left:3px solid transparent;line-height:1.4}
  .wiki-nav a.topic:hover{background:var(--c-gray-lt);border-left-color:var(--c-charcoal)}
  .wiki-nav a.topic.active{background:var(--c-blue-tint);border-left-color:var(--c-blue);color:var(--c-blue);font-weight:600}

  /* ===== CONTENT ===== */
  .wiki-main{padding:0}
  .wiki-content{background:var(--c-white);min-height:100vh;padding:32px 40px 60px;max-width:1000px}
  @media (max-width:880px){.wiki-content{padding:24px 20px 40px}}

  .wiki-content .topic-title{font-size:28px;font-weight:800;color:var(--c-black);margin-bottom:4px;border-bottom:3px solid var(--c-blue);padding-bottom:12px}
  .wiki-content .breadcrumb{font-size:12px;color:var(--c-charcoal);text-transform:uppercase;letter-spacing:.05em;margin-bottom:18px;font-weight:600}

  .topic-body{font-size:14px;line-height:1.8;color:var(--c-black)}
  .topic-body h2{font-size:18px;font-weight:700;color:var(--c-blue);margin:24px 0 10px;padding-bottom:5px;border-bottom:1px solid var(--c-gray)}
  .topic-body h3{font-size:15px;font-weight:700;color:var(--c-charcoal);margin:16px 0 6px}
  .topic-body p{margin:8px 0 12px}
  .topic-body strong{color:var(--c-black);font-weight:700}
  .topic-body ul{margin:8px 0 14px 22px}
  .topic-body li{margin:4px 0}
  .topic-body table{border-collapse:collapse;margin:12px 0;font-size:13px;width:auto}
  .topic-body th,.topic-body td{border:1px solid var(--c-gray);padding:7px 12px;text-align:left}
  .topic-body th{background:var(--c-blue);color:var(--c-white);font-weight:700}
  .topic-body tr:nth-child(even) td{background:var(--c-gray-lt)}
  .topic-body code{background:var(--c-gray-lt);padding:2px 6px;border-radius:3px;font-family:'Consolas',monospace;font-size:13px;color:var(--c-blue)}
  .topic-body figure{margin:14px auto;width:fit-content;max-width:100%}
  .topic-body figure img{display:block;max-width:100%}
  .topic-body figure img:not([style*="width"]){width:100%}
  .topic-body figcaption{padding:7px 4px;font-size:12px;font-style:italic;color:var(--c-charcoal);text-align:center}
  .topic-body blockquote{margin:12px 0;padding:10px 16px;background:var(--c-blue-tint);border-left:4px solid var(--c-blue);font-size:13px;line-height:1.65;color:var(--c-charcoal)}

  .loading{color:var(--c-charcoal);font-style:italic;padding:20px 0}
   
  .cite{font-size:8px;color:#9B1C1C;font-weight:700;vertical-align:super;cursor:default;background:rgba(155,28,28,.08);border-radius:2px;padding:0 2px}

  /* Mobile toggle */
  .side-toggle{display:none;position:fixed;left:10px;top:10px;z-index:60;background:var(--c-blue);color:var(--c-white);border:none;border-radius:6px;padding:8px 11px;cursor:pointer;font-size:16px}
  @media (max-width:880px){
    .side-toggle{display:block}
    .wiki-side{position:fixed;left:0;top:0;width:280px;z-index:55;transform:translateX(-100%);transition:transform .2s}
    .wiki-side.open{transform:translateX(0)}
    .wiki-content{padding-top:54px}
  }
</style>
</head>
<body>

<button class="side-toggle" onclick="document.querySelector('.wiki-side').classList.toggle('open')">☰</button>

<div class="wiki-layout">

  <nav class="wiki-side">
    <div class="wiki-brand">
      <div class="logo">Specific Processes in Fab</div>
      <div class="sub">Green Fab 28nm · Knowledge Base</div>
      <a style="color: #e79d3c; font-size: 12px; font-style: italic; text-decoration: none;" href="index.html"> ← Back to main</a>
    </div>
    <div class="wiki-nav" id="wiki-nav">
      <!-- populated by JS -->
    </div>
  </nav>

  <main class="wiki-main">
    <div class="wiki-content" id="wiki-content">
      <div class="loading">Đang tải...</div>
    </div>
  </main>

</div>

<script>
// ============================================================
// Fab Engineering Wiki — load more.json, render grouped nav + content
// ============================================================

let WIKI_DATA = null;

// ---- Minimal markdown renderer ----
function mdToHtml(md) {
  if (!md) return '';
  const lines = md.split('\n');
  let html = '', i = 0;
  while (i < lines.length) {
    let line = lines[i];

    // Raw HTML block
    const htmlOpen = line.match(/^<(div|p|section|article|center|aside|figure|blockquote)\b([^>]*)>\s*$/i);
    if (htmlOpen) {
      const tag = htmlOpen[1].toLowerCase();
      const attrs = htmlOpen[2] || '';
      const closeRe = new RegExp('^</' + tag + '>\\s*$', 'i');
      let depth = 1, j = i + 1;
      const innerLines = [];
      while (j < lines.length) {
        if (lines[j].match(new RegExp('^<' + tag + '\\b[^>]*>\\s*$', 'i'))) depth++;
        else if (closeRe.test(lines[j])) { depth--; if (depth === 0) break; }
        innerLines.push(lines[j]);
        j++;
      }
      html += '<' + tag + attrs + '>' + mdToHtml(innerLines.join('\n')) + '</' + tag + '>';
      i = j + 1; continue;
    }
    // Single-line raw HTML
    if (/^<[a-zA-Z][^>]*>/.test(line.trim())) { html += line; i++; continue; }

    // Table
    if (line.startsWith('|') && i+1 < lines.length && lines[i+1].match(/^\|[-: |]+\|$/)) {
      const headers = line.split('|').slice(1,-1).map(s => s.trim());
      i += 2;
      const rows = [];
      while (i < lines.length && lines[i].startsWith('|')) {
        rows.push(lines[i].split('|').slice(1,-1).map(s => s.trim()));
        i++;
      }
      html += '<table><thead><tr>' + headers.map(h => '<th>'+inline(h)+'</th>').join('') + '</tr></thead><tbody>';
      rows.forEach(r => { html += '<tr>' + r.map(c => '<td>'+inline(c)+'</td>').join('') + '</tr>'; });
      html += '</tbody></table>';
      continue;
    }

    // Headings
    if (line.startsWith('## ')) { html += '<h2>'+inline(line.slice(3))+'</h2>'; i++; continue; }
    if (line.startsWith('### ')) { html += '<h3>'+inline(line.slice(4))+'</h3>'; i++; continue; }

    // Blockquote (callouts: > text, supports multi-line)
    if (line.startsWith('> ')) {
      const quoteLines = [];
      while (i < lines.length && lines[i].startsWith('> ')) {
        quoteLines.push(lines[i].slice(2));
        i++;
      }
      html += '<blockquote>' + inline(quoteLines.join(' ')) + '</blockquote>';
      continue;
    }

    // Bullet list
    if (line.startsWith('- ')) {
      html += '<ul>';
      while (i < lines.length && lines[i].startsWith('- ')) { html += '<li>'+inline(lines[i].slice(2))+'</li>'; i++; }
      html += '</ul>';
      continue;
    }

    // Image with optional {width=...}
    const imgMatch = line.match(/^!\[(.*?)\]\((.*?)\)(\{(.*?)\})?$/);
    if (imgMatch) {
      let src = imgMatch[2];
      const caption = imgMatch[1];
      const attrStr = imgMatch[4] || '';
      if (src.startsWith('/') && !src.startsWith('//')) src = src.slice(1);
      if (!/^https?:\/\//i.test(src) && !src.startsWith('content/')) src = 'content/images/' + src;

      let imgStyle = '', figStyle = '';
      if (attrStr) {
        const wMatch = attrStr.match(/width\s*=\s*([^\s}]+)/);
        const hMatch = attrStr.match(/height\s*=\s*([^\s}]+)/);
        if (wMatch) {
          let w = wMatch[1].replace(/['"]/g, '');
          if (/^\d+$/.test(w)) w += 'px';
          if (w.endsWith('%')) figStyle += 'width:' + w + ';';
          else imgStyle += 'width:' + w + ';max-width:100%;';
        }
        if (hMatch) { let h = hMatch[1].replace(/['"]/g, ''); if (/^\d+$/.test(h)) h += 'px'; imgStyle += 'height:' + h + ';'; }
      }
      html += '<figure'+(figStyle?' style="'+figStyle+'"':'')+'><img src="'+src+'" alt="'+caption+'"'+(imgStyle?' style="'+imgStyle+'"':'')+'>';
      
      html += '</figure>';
      i++; continue;
    }

    if (line.trim() === '') { i++; continue; }
    html += '<p>'+inline(line)+'</p>';
    i++;
  }
  return html;
}

function inline(s) {
  // Tách các thẻ HTML hợp lệ ra, giữ nguyên không escape
  const tags = [];
  s = s.replace(/<\/?[a-zA-Z][a-zA-Z0-9]*(?:\s[^<>]*)?>/g, m => {
    tags.push(m);
    return '\u0000' + (tags.length - 1) + '\u0000';
  });

  s = s
    .replace(/\\</g, '___LT___')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/___LT___/g, '&lt;')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/(?<![\w])_(.+?)_(?![\w])/g, '<em>$1</em>')
    .replace(/`(.+?)`/g, '<code>$1</code>');

  // Trả lại các thẻ đã tách
  s = s.replace(/\u0000(\d+)\u0000/g, (_, n) => tags[+n]);
  return s;
}

// ---- Render grouped navigation ----
function renderNav(data) {
  const nav = document.getElementById('wiki-nav');
  let html = '';

  // Search bar at top
  html += '<div class="nav-search"><input id="nav-search-input" type="text" ' +
          'placeholder="🔍 Search articles…" autocomplete="off"></div>';

  // Home link at top
  html += '<a href="#home" class="nav-home" data-id="__home__">🏠 Home</a>';

  // Group topics by subtopic, in subtopic order
  data.subtopics.forEach(sub => {
    const topicsInSub = data.topics.filter(t => t.subtopic === sub.id);
    if (topicsInSub.length === 0) return;
    html += '<div class="nav-group-label" data-group="' + sub.id + '">' + sub.label + '</div>';
    topicsInSub.forEach(t => {
      html += '<a href="#' + t.id + '" class="topic" data-id="' + t.id +
              '" data-group="' + sub.id + '">' + t.title + '</a>';
    });
  });

  nav.innerHTML = html;

  // Wire up clicks
  nav.querySelectorAll('a[data-id]').forEach(a => {
    a.onclick = (e) => {
      e.preventDefault();
      const id = a.dataset.id;
      if (id === '__home__') showHome();
      else showTopic(id);
      document.querySelector('.wiki-side').classList.remove('open');
    };
  });

  // Wire up search filter
  const search = document.getElementById('nav-search-input');
  if (search) search.addEventListener('input', () => filterNav(search.value));
}

function filterNav(query) {
  const q = (query || '').toLowerCase().trim();
  const topics = document.querySelectorAll('#wiki-nav a.topic');
  const groupHasMatch = {};

  topics.forEach(a => {
    const match = !q || a.textContent.toLowerCase().includes(q);
    a.style.display = match ? '' : 'none';
    if (match) groupHasMatch[a.dataset.group] = true;
  });

  // Hide a group label if none of its topics match
  document.querySelectorAll('#wiki-nav .nav-group-label').forEach(lbl => {
    lbl.style.display = groupHasMatch[lbl.dataset.group] ? '' : 'none';
  });

  // Hide the Home link while actively searching
  const home = document.querySelector('#wiki-nav .nav-home');
  if (home) home.style.display = q ? 'none' : '';
}

function setActive(id) {
  document.querySelectorAll('#wiki-nav a').forEach(a => {
    a.classList.toggle('active', a.dataset.id === id);
  });
}

function showHome() {
  setActive('__home__');
  document.getElementById('wiki-content').innerHTML =
    '<div class="breadcrumb">Specific Processes in Fab</div>' +
    '<div class="topic-title">Home</div>' +
    '<div class="topic-body" id="body-target"><div class="loading">Đang tải...</div></div>';
  fetch('content/home.md', {cache:'no-cache'})
    .then(r => { if(!r.ok) throw new Error('HTTP '+r.status); return r.text(); })
    .then(md => { document.getElementById('body-target').innerHTML = mdToHtml(md); })
    .catch(err => { document.getElementById('body-target').innerHTML = '<p style="color:#b00">⚠ '+err.message+'</p>'; });
  history.replaceState(null, '', '#home');
}

function showTopic(id) {
  const t = WIKI_DATA.topics.find(x => x.id === id);
  if (!t) { showHome(); return; }
  setActive(id);

  const sub = WIKI_DATA.subtopics.find(s => s.id === t.subtopic);
  const crumb = sub ? sub.label : '';

  document.getElementById('wiki-content').innerHTML =
    '<div class="breadcrumb">' + crumb + '</div>' +
    '<div class="topic-title">' + t.title + '</div>' +
    '<div class="topic-body" id="body-target"><div class="loading">Đang tải nội dung...</div></div>';

  fetch(t.file, {cache:'no-cache'})
    .then(r => { if(!r.ok) throw new Error('Không tải được '+t.file+' (HTTP '+r.status+')'); return r.text(); })
    .then(md => { document.getElementById('body-target').innerHTML = mdToHtml(md); })
    .catch(err => { document.getElementById('body-target').innerHTML = '<p style="color:#b00">⚠ '+err.message+'</p>'; });

  history.replaceState(null, '', '#' + id);
  if (window.innerWidth < 880) document.getElementById('wiki-content').scrollIntoView();
}


// ---- Lắng nghe đổi hash (để link nội bộ trong .md hoạt động) ----
window.addEventListener('hashchange', () => {
  const hash = location.hash.slice(1);
  if (!hash || hash === 'home') { showHome(); return; }
  if (WIKI_DATA && WIKI_DATA.topics.find(t => t.id === hash)) {
    showTopic(hash);
  }
});
// ---- Bootstrap ----
fetch('data/more.json', {cache:'no-cache'})
  .then(r => { if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
  .then(data => {
    WIKI_DATA = data;
    renderNav(data);
    const hash = location.hash.slice(1);
    if (hash && hash !== 'home' && data.topics.find(t => t.id === hash)) showTopic(hash);
    else showHome();
  })
  .catch(err => {
    document.getElementById('wiki-content').innerHTML =
      '<div class="topic-title">Lỗi tải dữ liệu</div><p style="color:#b00">' + err.message +
      '<br>Đảm bảo mở qua web server (không phải file://).</p>';
  });
</script>
</body>
</html>
