<svg xmlns="http://www.w3.org/2000/svg" aria-label="Sáu giai đoạn chuyển giao công nghệ" role="img" viewBox="0 0 1074 150">
<style type="text/css"><![CDATA[
  .dur{font:600 14px "Segoe UI",sans-serif;fill:#475569;text-anchor:middle}
  .pt{font:600 12px "Segoe UI",sans-serif;fill:#1A3C2E;text-anchor:middle}
  .arr{stroke:#1A3C2E;stroke-width:1.8;fill:none;marker-end:url(#ah)}
]]></style>
<defs><marker id="ah" markerHeight="7" markerWidth="7" orient="auto" refX="9" refY="5" viewBox="0 0 10 10"><path d="M0,0 L10,5 L0,10 z" fill="#1A3C2E"></path></marker></defs>
<text class="dur" x="92" y="24">P0</text>
